<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Toopa BFMR Cache</title>
    <style>
      body {
        align-items: center;
        background: #f6f8fb;
        color: #18222f;
        display: grid;
        font-family: Arial, sans-serif;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        background: #ffffff;
        border: 1px solid #d7dde8;
        border-radius: 8px;
        margin: auto;
        max-width: 520px;
        padding: 24px;
      }

      h1 {
        font-size: 22px;
        margin: 0 0 10px;
      }

      p {
        line-height: 1.45;
        margin: 0 0 14px;
      }

      a {
        color: #047d78;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Refreshing Toopa's BFMR Tracking</h1>
      <p id="status">Clearing the old app cache...</p>
      <p><a id="fallback" href="/?fresh=20260624-6">Open the refreshed app</a></p>
    </main>
    <script>
      async function resetApp() {
        const status = document.getElementById("status");
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
          status.textContent = "Old cache cleared. Opening the refreshed app...";
        } catch (error) {
          status.textContent = `Cache reset hit a browser issue: ${error.message}. Opening anyway...`;
        }
        window.setTimeout(() => {
          window.location.replace("/?fresh=20260624-6");
        }, 800);
      }

      resetApp();
    </script>
  </body>
</html>
